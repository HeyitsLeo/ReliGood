services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zamgo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zamgo
      POSTGRES_PASSWORD: zamgo_dev
      POSTGRES_DB: zamgo
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zamgo -d zamgo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zamgo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  redis_data:
